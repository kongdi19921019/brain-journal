<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>脑科学阅读笔记 · Sylvia</title>
  <style>
    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --accent: #7c6fcd;
      --text: #2d2d2d;
      --muted: #888;
      --border: #ebebeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; line-height: 1.75; }
    header { padding: 3rem 2rem 2rem; text-align: center; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.8rem; color: var(--accent); letter-spacing: 0.05em; }
    header p { margin-top: 0.5rem; color: var(--muted); font-size: 0.95rem; }
    main { max-width: 720px; margin: 2rem auto; padding: 0 1.5rem; }
    .book-tag { display: inline-block; background: #ede9fb; color: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 0.75rem; }
    .entry { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; margin-bottom: 1.5rem; }
    .entry-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.5rem; }
    .entry h2 { font-size: 1.15rem; margin-bottom: 0.75rem; color: var(--text); }
    .entry p { font-size: 0.97rem; color: #444; }
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 脑科学阅读笔记</h1>
    <p>读书、思考、记录 · Sylvia</p>
  </header>
  <main id="entries">
    <div class="entry">
      <div class="entry-meta">2026-03-04 · 启程</div>
      <span class="book-tag">The Neuroscience of Self-Love</span>
      <h2>为什么想读这个方向？</h2>
      <p>最近读完了《The Neuroscience of Self-Love》，感觉脑科学和自我认知的交叉地带很有意思。大脑如何塑造我们对自己的看法，情绪背后的神经机制——这些问题让我想继续挖下去。接下来打算系统地读这个方向的经典书目，每天记录一些想法。</p>
    </div>
  </main>
  <footer>持续更新中 · Made with curiosity</footer>
</body>
</html>
